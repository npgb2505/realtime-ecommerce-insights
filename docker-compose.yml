services:
  redpanda:
    image: redpandadata/redpanda:v25.1.9
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 768M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 12

  console:
    image: redpandadata/console:v3.2.2
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8081:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  pipeline:
    build: .
    environment:
      ECOM_DATA_ROOT: /app/data
      ECOM_SPARK_MASTER: local[2]
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./powerbi/exports:/app/powerbi/exports
    command:
      - demo
      - --root
      - /app/data
      - --days
      - "14"
      - --events-per-day
      - "100"

  producer:
    profiles: ["kafka"]
    build: .
    entrypoint: ["python3", "-m", "realtime_commerce.producer"]
    command:
      - --sink
      - kafka
      - --bootstrap
      - redpanda:9092
      - --events
      - "1000"
    depends_on:
      redpanda:
        condition: service_healthy
